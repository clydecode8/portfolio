<svg width="900" height="620" viewBox="0 0 900 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="620" rx="40" fill="#F0FDF4"/>
  <!-- Decorative blobs -->
  <circle cx="760" cy="110" r="140" fill="#BBF7D0" opacity=".65"/>
  <circle cx="160" cy="520" r="180" fill="#DCFCE7" opacity=".85"/>

  <!-- Main card -->
  <rect x="90" y="82" width="720" height="456" rx="28" fill="white" stroke="#86EFAC" stroke-width="3"/>

  <!-- LEFT PANEL: Chat interface / user panel -->
  <rect x="125" y="120" width="275" height="365" rx="22" fill="#F8FAFC" stroke="#BBF7D0" stroke-width="2"/>

  <!-- Panel header label -->
  <rect x="150" y="148" width="130" height="16" rx="8" fill="#22C55E"/>

  <!-- User message bubble 1 -->
  <rect x="150" y="185" width="210" height="38" rx="14" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="162" y="197" width="130" height="9" rx="4.5" fill="#16A34A"/>
  <rect x="162" y="211" width="90" height="7" rx="3.5" fill="#86EFAC"/>

  <!-- Bot reply bubble 1 -->
  <rect x="150" y="239" width="230" height="38" rx="14" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <rect x="162" y="251" width="150" height="9" rx="4.5" fill="#4ADE80"/>
  <rect x="162" y="265" width="110" height="7" rx="3.5" fill="#BBF7D0"/>

  <!-- User message bubble 2 -->
  <rect x="150" y="293" width="190" height="38" rx="14" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="162" y="305" width="110" height="9" rx="4.5" fill="#16A34A"/>
  <rect x="162" y="319" width="80" height="7" rx="3.5" fill="#86EFAC"/>

  <!-- Escalate to agent button -->
  <rect x="150" y="350" width="215" height="38" rx="14" fill="#FEF9C3" stroke="#FDE047" stroke-width="1.5"/>
  <rect x="162" y="362" width="100" height="9" rx="4.5" fill="#CA8A04"/>
  <rect x="162" y="376" width="140" height="7" rx="3.5" fill="#FDE68A"/>

  <!-- Input bar -->
  <rect x="150" y="405" width="215" height="34" rx="14" fill="#ECFDF5" stroke="#86EFAC" stroke-width="1.5"/>
  <rect x="165" y="418" width="120" height="8" rx="4" fill="#BBF7D0"/>
  <!-- Send icon (circle) -->
  <circle cx="351" cy="422" r="10" fill="#22C55E"/>
  <polygon points="347,418 357,422 347,426" fill="white"/>

  <!-- RIGHT PANEL TOP: Chatbot Engine -->
  <rect x="465" y="140" width="280" height="82" rx="22" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
  <rect x="490" y="164" width="130" height="12" rx="6" fill="#16A34A"/>
  <rect x="490" y="192" width="210" height="9" rx="4.5" fill="#6EE7B7"/>
  <!-- Bot icon -->
  <rect x="698" y="158" width="28" height="24" rx="8" fill="#22C55E"/>
  <circle cx="706" cy="168" r="3" fill="white"/>
  <circle cx="718" cy="168" r="3" fill="white"/>
  <rect x="703" y="174" width="18" height="4" rx="2" fill="white"/>

  <!-- RIGHT PANEL MIDDLE: Live Chat / Agent -->
  <rect x="465" y="268" width="280" height="82" rx="22" fill="#FFF7ED" stroke="#FED7AA" stroke-width="2"/>
  <rect x="490" y="292" width="110" height="12" rx="6" fill="#C2410C"/>
  <rect x="490" y="320" width="200" height="9" rx="4.5" fill="#FDBA74"/>
  <!-- Agent icon (person) -->
  <circle cx="712" cy="166" r="0" fill="none"/>
  <circle cx="712" cy="292" r="10" fill="#FB923C"/>
  <path d="M700 310 Q712 302 724 310" stroke="#FB923C" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- RIGHT PANEL BOTTOM: Analytics / Ticket -->
  <rect x="465" y="396" width="280" height="82" rx="22" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
  <rect x="490" y="420" width="140" height="12" rx="6" fill="#1D4ED8"/>
  <rect x="490" y="448" width="215" height="9" rx="4.5" fill="#93C5FD"/>
  <!-- Chart icon bars -->
  <rect x="698" y="420" width="8" height="20" rx="2" fill="#3B82F6"/>
  <rect x="710" y="428" width="8" height="12" rx="2" fill="#93C5FD"/>
  <rect x="722" y="414" width="8" height="26" rx="2" fill="#1D4ED8"/>

  <!-- Connector lines -->
  <!-- Left panel → Chatbot (top right) -->
  <path d="M400 255 C430 255 430 181 460 181" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
  <!-- Left panel → Live Agent (mid right) -->
  <path d="M400 330 C430 330 430 309 460 309" stroke="#F97316" stroke-width="5" stroke-linecap="round"/>
  <!-- Left panel → Analytics (bottom right) -->
  <path d="M400 390 C430 390 430 437 460 437" stroke="#3B82F6" stroke-width="5" stroke-linecap="round"/>
</svg>
